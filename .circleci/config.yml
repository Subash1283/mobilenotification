version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:20.10

    working_directory: ~/repo

    steps:
      - checkout

      - run:
          name: Install Dependencies
          command: npm install

      - run:
          name: Run Lint
          command: npm run lint

      - run:
          name: Run Tests
          command: npm run test

      - run:
          name: Build Project
          command: npm run build

workflows:
  version: 2
  build_and_test:
    jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Clone repository
          command: git clone git@github.com:Subash1283/mobilenotification.git